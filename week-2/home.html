<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Online Book Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="h1">Welcome</div>
      <p class="muted" style="margin-top:0;">
        This page demonstrates <strong>CSS styling</strong> applied to content shown inside frames.
      </p>

      <div class="h2">Frame Layout</div>
      <ul style="margin: 0; padding-left: 18px;">
        <li><strong>Navigation frame</strong> (left): styled menu and links</li>
        <li><strong>Content frame</strong> (right): styled book details</li>
        <li><strong>Footer frame</strong> (bottom): styled extra info</li>
      </ul>

      <p style="margin-bottom:0;">
        Use the navigation on the left to open a book.
      </p>
    </div>
  </div>
</body>
</html>
