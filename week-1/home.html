<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Online Book Store</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 18px; line-height: 1.5; }
    h1 { margin-top: 0; }
    .card { border: 1px solid #ccc; padding: 14px; }
    .muted { color: #444; }
  </style>
</head>
<body>
  <h1>Welcome</h1>

  <div class="card">
    <p class="muted">
      This page demonstrates an <strong>HTML Frames</strong> layout:
    </p>
    <ul>
      <li><strong>Navigation frame</strong> (left): book list and links</li>
      <li><strong>Content frame</strong> (right): displays book details</li>
      <li><strong>Footer frame</strong> (bottom): extra information</li>
    </ul>
    <p>
      Use the navigation to open any book page.
    </p>
  </div>
</body>
</html>
