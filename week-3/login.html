<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="h1">Login</div>
      <p class="muted" style="margin-top:0;">Login to view books and your profile.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="name@example.com">
        </div>

        <div class="field">
          <label class="label" for="password">Password</label>
          <input class="input" id="password" type="password" placeholder="Enter password">
        </div>

        <button class="btn" type="submit">Login</button>
        <div id="loginMessage" class="msg" style="display:none;"></div>
      </form>

      <div class="muted small" style="margin-top:12px;">
        <a href="forgot.html">Forgot Password?</a>
        &nbsp;|&nbsp;
        <a href="register.html">Create an account</a>
      </div>
    </div>
  </div>

  <script>
    window.initLoginForm();
  </script>
</body>
</html>
